---
- name: Enable auto power management for USB monitor network card
  ansible.builtin.copy:
    content: |
      # Enable auto power management for the monitor's USB network card
      ACTION=="add", SUBSYSTEM=="usb", ATTR{idVendor}=="0bda", ATTR{idProduct}=="8153", TEST=="power/control", ATTR{power/control}="auto"
    dest: /etc/udev/rules.d/99-monitor-network-power.rules
    mode: "0644"
  notify: Reload udev
- name: Install powertop service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Powertop tunings

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/bin/powertop --auto-tune
      ExecStartPost=/bin/sh -c \
        'find /sys/bus/usb/drivers/usbhid -regex ".*/[0-9:.-]+" \
        | sed "s|.*/||;s|:.*||" | sort -u \
        | xargs -rI{} sh -c "echo on > /sys/bus/usb/devices/{}/power/control"'

      [Install]
      WantedBy=multi-user.target sleep.target
    dest: /etc/systemd/system/powertop.service
    mode: "0644"
- name: Enable powertop service
  ansible.builtin.systemd_service:
    name: powertop.service
    enabled: true
    daemon_reload: true
- name: Install PCIe ASPM powersave policy
  ansible.builtin.copy:
    content: "w /sys/module/pcie_aspm/parameters/policy - - - - powersave\n"
    dest: /etc/tmpfiles.d/aspm-powersave.conf
    mode: "0644"
- name: Ensure system-sleep directory exists
  ansible.builtin.file:
    path: /usr/lib/systemd/system-sleep
    state: directory
    mode: "0755"
- name: Create sleep hook for power management
  ansible.builtin.copy:
    content: |
      #!/bin/bash

      LOG_TAG="power-management"

      case $1 in
        pre)
          logger -t "$LOG_TAG" "Sleep hook triggered: pre-sleep"

          # Save Wi-Fi and Bluetooth state
          rfkill -no SOFT list wifi | head -n1 > /var/run/previous_wifi_state
          rfkill -no SOFT list bluetooth | head -n1 > /var/run/previous_bluetooth_state
          logger -t "$LOG_TAG" "Saved states - wifi: $(cat /var/run/previous_wifi_state), bluetooth: $(cat /var/run/previous_bluetooth_state)"

          # Disable Wi-Fi and Bluetooth
          rfkill block wifi
          rfkill block bluetooth
          logger -t "$LOG_TAG" "Blocked wifi and bluetooth"
          logger -t "$LOG_TAG" "Pre-sleep complete."
          ;;
        post)
          logger -t "$LOG_TAG" "Sleep hook triggered: post-wake"

          # Restore Wi-Fi and Bluetooth state
          if [ "$(cat /var/run/previous_wifi_state 2>/dev/null)" = "unblocked" ]; then
            rfkill unblock wifi
            logger -t "$LOG_TAG" "Restored wifi: unblocked"
          fi
          if [ "$(cat /var/run/previous_bluetooth_state 2>/dev/null)" = "unblocked" ]; then
            rfkill unblock bluetooth
            logger -t "$LOG_TAG" "Restored bluetooth: unblocked"
          fi
          rm -f /var/run/previous_wifi_state /var/run/previous_bluetooth_state

          logger -t "$LOG_TAG" "Post-wake complete."
          ;;
      esac
    dest: /usr/lib/systemd/system-sleep/power-management.sh
    mode: "0755"
