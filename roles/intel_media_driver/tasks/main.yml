---
- name: Install RPM Fusion non-free repository release package
  ansible.builtin.dnf:
    name: "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_facts['distribution_major_version'] }}.noarch.rpm"
    state: present
  become: true

- name: Restrict rpmfusion-nonfree repo to intel-media-driver
  community.general.ini_file:
    path: /etc/yum.repos.d/rpmfusion-nonfree.repo
    section: rpmfusion-nonfree
    option: includepkgs
    value: intel-media-driver
    no_extra_spaces: true
    mode: "0644"
  become: true

- name: Restrict rpmfusion-nonfree-updates repo to intel-media-driver
  community.general.ini_file:
    path: /etc/yum.repos.d/rpmfusion-nonfree-updates.repo
    section: rpmfusion-nonfree-updates
    option: includepkgs
    value: intel-media-driver
    no_extra_spaces: true
    mode: "0644"
  become: true

- name: Install intel-media-driver
  ansible.builtin.dnf:
    name: intel-media-driver
    state: present
  become: true
