---
#
# Install / update Antigravity from a pre-downloaded tarball
#

- name: Check primary tarball path
  ansible.builtin.stat:
    path: "{{ antigravity_tarball }}"
  register: antigravity_tarball_stat

- name: Check architecture-specific tarball path
  ansible.builtin.stat:
    path: "{{ var_home }}/Downloads/Antigravity-{{ antigravity_arch }}.tar.gz"
  register: antigravity_arch_tarball_stat
  when: not antigravity_tarball_stat.stat.exists

- name: Set resolved tarball path
  ansible.builtin.set_fact:
    antigravity_resolved_tarball: >-
      {{
        antigravity_tarball if antigravity_tarball_stat.stat.exists
        else (var_home ~ '/Downloads/Antigravity-' ~ antigravity_arch ~ '.tar.gz')
      }}

- name: Check if resolved tarball exists
  ansible.builtin.stat:
    path: "{{ antigravity_resolved_tarball }}"
  register: antigravity_resolved_tarball_stat

- name: Fail if tarball is missing
  ansible.builtin.fail:
    msg: >-
      Tarball not found at {{ antigravity_tarball }} or {{ var_home }}/Downloads/Antigravity-{{ antigravity_arch }}.tar.gz.
      Download it first into ~/Downloads/
  when: not antigravity_resolved_tarball_stat.stat.exists

- name: Remove existing installation directory
  ansible.builtin.file:
    path: "{{ antigravity_install_dir }}"
    state: absent

- name: Create installation directory
  ansible.builtin.file:
    path: "{{ antigravity_install_dir }}"
    state: directory
    owner: "{{ var_user }}"
    group: "{{ var_user }}"
    mode: "0755"

- name: Extract tarball into install directory
  ansible.builtin.unarchive:
    src: "{{ antigravity_resolved_tarball }}"
    dest: "{{ antigravity_install_dir }}"
    remote_src: true
    extra_opts:
      - --strip-components=1
    owner: "{{ var_user }}"
    group: "{{ var_user }}"

- name: Download icon
  ansible.builtin.get_url:
    url: "{{ antigravity_icon_url }}"
    dest: "{{ antigravity_install_dir }}/antigravity.png"
    mode: "0644"

- name: Create symlink in /usr/local/bin
  ansible.builtin.file:
    src: "{{ antigravity_install_dir }}/antigravity"
    dest: "{{ antigravity_bin }}"
    state: link

- name: Install desktop entry
  ansible.builtin.copy:
    content: |
      [Desktop Entry]
      Version=1.0
      Name=Google Antigravity
      Comment=Agent-first AI development platform
      Exec={{ antigravity_bin }} %U
      Icon={{ antigravity_install_dir }}/antigravity.png
      Terminal=false
      Type=Application
      Categories=Development;IDE;
      StartupWMClass=antigravity
      MimeType=x-scheme-handler/antigravity;
    dest: "{{ var_home }}/.local/share/applications/antigravity.desktop"
    mode: "0644"
  become: true
  become_user: "{{ var_user }}"
  notify: Update desktop database
