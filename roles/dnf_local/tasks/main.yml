---
- name: Install required packages on host
  ansible.builtin.dnf:
    name:
      - libdnf5-plugin-local
      - createrepo_c
      - acl
    state: present
  become: true

- name: Determine the real user
  ansible.builtin.set_fact:
    dnf_local_real_user: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"

- name: Create local repository directory
  ansible.builtin.file:
    path: /var/lib/dnf/plugins/local
    state: directory
    mode: '0775'
    owner: "{{ dnf_local_real_user }}"
    group: "{{ dnf_local_real_user }}"
  become: true

- name: Check if local-nogpgcheck directory exists (not as symlink)
  ansible.builtin.stat:
    path: /var/lib/dnf/plugins/local-nogpgcheck
  register: dnf_local_nogpgcheck_stat
  become: true

- name: Remove spurious local-nogpgcheck directory
  ansible.builtin.file:
    path: /var/lib/dnf/plugins/local-nogpgcheck
    state: absent
  become: true
  when: dnf_local_nogpgcheck_stat.stat.exists and not dnf_local_nogpgcheck_stat.stat.islnk

- name: Create local-nogpgcheck symlink to local
  ansible.builtin.file:
    src: /var/lib/dnf/plugins/local
    dest: /var/lib/dnf/plugins/local-nogpgcheck
    state: link
  become: true
  when: dnf_local_nogpgcheck_stat.stat.exists and not dnf_local_nogpgcheck_stat.stat.islnk

- name: Set ACL for real user on local repository directory
  ansible.posix.acl:
    path: /var/lib/dnf/plugins/local
    entity: "{{ dnf_local_real_user }}"
    etype: user
    permissions: rwx
    default: "{{ item }}"
    state: present
  loop:
    - true
    - false
  become: true

- name: Initialize repository if empty
  ansible.builtin.command: createrepo_c /var/lib/dnf/plugins/local
  args:
    creates: /var/lib/dnf/plugins/local/repodata
  become: true

- name: Configure dnf-plugin-local on host
  community.general.ini_file:
    path: /etc/dnf/libdnf5-plugins/local.conf
    section: main
    option: "{{ item.key }}"
    value: "{{ item.value }}"
    create: true
    mode: "0644"
  loop:
    - { key: 'enabled', value: '1' }
    - { key: 'repodir', value: '/var/lib/dnf/plugins/local' }
  become: true

- name: Override local repository configuration to disable GPG checks
  community.general.ini_file:
    path: /etc/yum.repos.d/my_local_cache.repo
    section: my_local_cache
    option: "{{ item.key }}"
    value: "{{ item.value }}"
    create: true
    mode: "0644"
  loop:
    - { key: 'name', value: 'Local Cache Override' }
    - { key: 'baseurl', value: 'file:///var/lib/dnf/plugins/local' }
    - { key: 'enabled', value: '1' }
    - { key: 'gpgcheck', value: '0' }
    - { key: 'pkg_gpgcheck', value: '0' }
    - { key: 'cost', value: '5' }
  become: true

- name: Get list of distrobox containers
  ansible.builtin.shell:
    cmd: set -o pipefail && distrobox list --no-color | awk -F '|' 'NR>1 {gsub(/^[ \t]+|[ \t]+$/, "", $2); if($2!="") print $2}'
    executable: /bin/bash
  register: dnf_local_distrobox_list_raw
  changed_when: false
  become: false

- name: Extract container names
  ansible.builtin.set_fact:
    dnf_local_distrobox_containers: "{{ dnf_local_distrobox_list_raw.stdout_lines }}"
  when: dnf_local_distrobox_list_raw.stdout_lines | length > 0

- name: Configure distrobox containers
  ansible.builtin.include_tasks: configure_distrobox.yml
  loop: "{{ dnf_local_distrobox_containers | default([]) }}"
  loop_control:
    loop_var: container_name
