- name: Stop and disable browser-sync services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    scope: user
  loop:
    - browser-sync.timer
    - browser-sync.service
    - browser-sync-periodic.service
    - firefox-sync.timer
    - firefox-sync.service
  ignore_errors: true

- name: Restore persistent cache directories
  ansible.builtin.shell: |
    if [ -L "{{ var_home }}/.cache/{{ item }}" ]; then
      rm -f "{{ var_home }}/.cache/{{ item }}"
    fi
    if [ -d "{{ var_home }}/.cache/{{ item }}-persistent" ]; then
      mv "{{ var_home }}/.cache/{{ item }}-persistent" "{{ var_home }}/.cache/{{ item }}"
    fi
  loop:
    - mozilla/firefox
    - google-chrome
    - chromium

- name: Remove browser-sync files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ var_home }}/.local/bin/browser-sync.sh"
    - "{{ var_home }}/.config/systemd/user/browser-sync.service"
    - "{{ var_home }}/.config/systemd/user/browser-sync-periodic.service"
    - "{{ var_home }}/.config/systemd/user/browser-sync.timer"
    - "{{ var_home }}/.local/bin/firefox-sync.sh"
    - "{{ var_home }}/.config/systemd/user/firefox-sync.service"
    - "{{ var_home }}/.config/systemd/user/firefox-sync-periodic.service"
    - "{{ var_home }}/.config/systemd/user/firefox-sync.timer"

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
